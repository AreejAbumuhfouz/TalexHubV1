  <!-- ══════════════════════════════════════════════════════
       CRITICAL CSS — prevents FOUC before React mounts
  ══════════════════════════════════════════════════════ -->
 <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      direction: rtl;
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%;
      background-color: #ffffff;
      color: #1A1A1E;
    }

    html[data-theme="dark"] {
      background-color: #000000;
      color: #F4F5F8;
    }

    body {
      background-color: inherit;
      color: inherit;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      min-height: 100dvh;
    }

    #root { min-height: 100dvh; isolation: isolate; }

    /* ── Loading screen — bg + centered logo, no spinner ── */
    #root:empty::before {
      content: '';
      display: block;
      position: fixed;
      inset: 0;
      background-color: #ffffff;
      z-index: 9999;
    }
    html[data-theme="dark"] #root:empty::before {
      background-color: #000000;
    }
    #root:empty::after {
      content: '';
      display: block;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      height: 40px;
      background-image: url('/Favicon.svg');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      z-index: 10000;
    }
    html[data-theme="dark"] #root:empty::after {
      background-image: url('/Favicon.svg');
    }

    .ltr { direction: ltr !important; }
    .rtl { direction: rtl !important; }

    [lang="en"] body, [lang="en"] #root {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      direction: ltr;
    }
  </style>

  <!-- ══════════════════════════════════════════════════════
       THEME INIT — run before React to avoid flash
  ══════════════════════════════════════════════════════ -->
  <script>
    (function () {
      try {
        var stored = JSON.parse(localStorage.getItem('TalexHub-theme') || '{}');
        var theme  = stored.state?.theme || 'light';
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {}
    })();
  </script>

  <!-- ══════════════════════════════════════════════════════
       STRUCTURED DATA — JSON-LD
  ══════════════════════════════════════════════════════ -->
  <script type="application/ld+json">
  {

    "@type": "WebSite",

    "inLanguage": ["ar", "en"],
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://TalexHub.com/jobs?q={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
